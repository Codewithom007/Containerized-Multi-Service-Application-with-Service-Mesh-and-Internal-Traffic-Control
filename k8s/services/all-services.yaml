apiVersion: v1
kind: Service
metadata:
  name: user-service            # This becomes a DNS name: user-service.microservices
  namespace: microservices
  labels:
    app: user-service
spec:
  selector:
    app: user-service           # Route to ANY pod with label app=user-service
  ports:
  - name: http
    port: 3001                  # Port that other services use to call us
    targetPort: 3001            # Port inside the container
  type: ClusterIP              # Internal only
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: microservices
  labels:
    app: order-service
spec:
  selector:
    app: order-service
  ports:
  - name: http
    port: 3002
    targetPort: 3002
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: microservices
  labels:
    app: payment-service
spec:
  selector:
    app: payment-service
  ports:
  - name: http
    port: 3003
    targetPort: 3003
  type: ClusterIP
