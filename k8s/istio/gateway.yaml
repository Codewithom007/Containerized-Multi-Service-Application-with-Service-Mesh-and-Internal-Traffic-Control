apiVersion: networking.istio.io/v1alpha3
kind: Gateway
metadata:
  name: main-gateway
  namespace: microservices
spec:
  selector:
    istio: ingressgateway      # Use the Istio ingress gateway pod
  servers:
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - "*"                      # Accept requests from any hostname
---
# VirtualService that connects the Gateway to the services
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: main-routes
  namespace: microservices
spec:
  hosts:
  - "*"
  gateways:
  - main-gateway
  http:
  - match:
    - uri:
        prefix: /users         # Requests to /users go to user-service
    route:
    - destination:
        host: user-service
        port:
          number: 3001
  - match:
    - uri:
        prefix: /orders
    route:
    - destination:
        host: order-service
        port:
          number: 3002
  - match:
    - uri:
        prefix: /payments
    route:
    - destination:
        host: payment-service
        port:
          number: 3003
