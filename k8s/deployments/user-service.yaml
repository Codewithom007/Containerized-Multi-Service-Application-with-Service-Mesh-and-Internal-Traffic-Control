# ─── Deployment for v1 ───────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service-v1          # Name of this deployment
  namespace: microservices       # Which namespace
  labels:
    app: user-service
    version: v1
spec:
  replicas: 2                    # Run 2 copies of this pod
  selector:
    matchLabels:                 # Find pods with these labels
      app: user-service
      version: v1
  template:                      # Template for creating pods
    metadata:
      labels:                    # Labels on each pod
        app: user-service
        version: v1
    spec:
      containers:
      - name: user-service
        image: user-service:v1   # The Docker image we built
        imagePullPolicy: Never   # IMPORTANT: Use local image, don't pull from internet
        ports:
        - containerPort: 3001
        env:
        - name: PORT
          value: "3001"
        - name: VERSION
          value: "v1"
        # Resource limits: prevents one service from hogging all CPU/RAM
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"       # 100 millicores = 0.1 CPU
          limits:
            memory: "128Mi"
            cpu: "200m"
        # readinessProbe: K8s checks this before sending traffic to the pod
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 5
        # livenessProbe: K8s restarts the pod if this fails
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 15
          periodSeconds: 10
---
# ─── Deployment for v2 (canary version) ──────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service-v2
  namespace: microservices
  labels:
    app: user-service
    version: v2
spec:
  replicas: 1                    # Only 1 copy of v2 (it's the canary)
  selector:
    matchLabels:
      app: user-service
      version: v2
  template:
    metadata:
      labels:
        app: user-service
        version: v2
    spec:
      containers:
      - name: user-service
        image: user-service:v2
        imagePullPolicy: Never
        ports:
        - containerPort: 3001
        env:
        - name: PORT
          value: "3001"
        - name: VERSION
          value: "v2"
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
